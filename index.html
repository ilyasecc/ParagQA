<!-- Lead Form Integration Script -->
<script type="module">
    const form = document.getElementById('leadForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // Configuration
    const config = {
        webhookUrl: 'https://qt8tp18t67.execute-api.ap-southeast-2.amazonaws.com/leads/api/webhooks/website',
        signingSecret: 'inom_lsk_8ulHCjFdpribDR0AEXloW9r8ZHRd1qJmFw7/StQaXxo=',
        siteKey: 'inom_lak_8b9874e282c8463c97095ecaa4366bb5'
    };

    async function generateSignature(timestamp, body) {
        const message = `${timestamp}.${body}`;
        const encoder = new TextEncoder();
        const keyData = encoder.encode(config.signingSecret);
        const messageData = encoder.encode(message);

        const cryptoKey = await crypto.subtle.importKey(
            'raw',
            keyData,
            { name: 'HMAC', hash: 'SHA-256' },
            false,
            ['sign']
        );

        const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);

        return Array.from(new Uint8Array(signature))
            .map(b => b.toString(16).padStart(2, '0'))
            .join('');
    }

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type} show`;

        setTimeout(() => {
            messageDiv.className = 'message';
        }, 5000);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                notes: document.getElementById('notes').value || ''
            };

            const timestamp = new Date().toISOString();
            const body = JSON.stringify(formData);
            const signature = await generateSignature(timestamp, body);

            const response = await fetch(config.webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Timestamp': timestamp,
                    'X-Signature': signature,
                    'X-Site-Key': config.siteKey
                },
                body
            });

            const result = await response.json();

            if (response.ok) {
                showMessage(
                    'Lead submitted successfully! Thank you for your interest.',
                    'success'
                );
                form.reset();
            } else {
                showMessage(
                    `Error: ${result.message || 'Failed to submit lead'}`,
                    'error'
                );
            }

        } catch (error) {
            console.error(error);
            showMessage(
                'An error occurred. Please try again later.',
                'error'
            );
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Lead';
        }
    });
</script>
